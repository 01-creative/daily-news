 name: Daily Briefing

  on:
    schedule:
      - cron: '0 23 * * *'
    workflow_dispatch:

  jobs:
    briefing:
      runs-on: ubuntu-latest
      timeout-minutes: 25
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '18'

        - name: Install Claude Code
          run: npm install -g @anthropic-ai/claude-code

        - name: Generate briefing
          env:
            ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
            ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
            ANTHROPIC_MODEL: deepseek-v4-pro
            ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-pro
            ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-pro
            ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
            CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
          run: claude -p "$(cat scripts/daily-briefing/prompt.md)" --output-format text --allowedTools WebSearch,WebFetch,Write,Bash上网、WebFetch写,Bash

        - name: Push to Feishu   —name：推至飞枢
          env:
            FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          run: python scripts/daily-briefing/feishu_push.py

        - name   名字: Archive   -名称：Archive
          run: |   
            git config user.name "Daily Briefing Bot"git config user.name "Daily Briefing Bot"；
            git config user.email "bot@01-creative.com"Git配置用户。电子邮件“bot@01-creative.com"
            git add ctf-training/日报/   Git add ctf-training/《金融时报》/
            git diff --staged --quiet || git commit -m "Daily briefing $(date +%Y-%m-%d)"git diff -阶段性-安静|| git commit -m "；每日简报$（日期%Y-%m-%d）"；
            git push   git推
