name: Daily Briefing

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Build prompt
        shell: bash
        run: |
          export TZ=Asia/Shanghai

          TODAY=$(date +%F)
          START_TIME=$(date -d "yesterday 07:00" +"%Y-%m-%d %H:%M")
          END_TIME=$(date -d "today 07:00" +"%Y-%m-%d %H:%M")

          sed \
            -e "s|{start_time}|${START_TIME}|g" \
            -e "s|{end_time}|${END_TIME}|g" \
            -e "s|{today}|${TODAY}|g" \
            scripts/daily-briefing/prompt.md \
            > /tmp/prompt.md

          {
            echo
            echo "## 近三天早报（禁止重复报道）"

            if ls ctf-training/日报/*.md >/dev/null 2>&1; then
              ls -t ctf-training/日报/*.md | head -3 | while read -r f; do
                echo
                echo "---"
                cat "$f"
              done
            else
              echo "暂无历史日报。"
            fi
          } >> /tmp/prompt.md

          echo "Prompt built:"
          echo "  Today : ${TODAY}"
          echo "  Window: ${START_TIME} -> ${END_TIME}"

      - name: Generate briefing
        env:
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
          CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
        run: |
          claude \
            -p "$(cat /tmp/prompt.md)" \
            --output-format text \
            --allowedTools WebSearch,WebFetch,Write,Bash

      - name: Push to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python scripts/daily-briefing/feishu_push.py

      - name: Archive
        run: |
          git config user.name "Daily Briefing Bot"
          git config user.email "bot@01-creative.com"

          git add ctf-training/日报/

          if ! git diff --cached --quiet; then
            git commit -m "Daily briefing $(date +%F)"
            git push
          else
            echo "No changes to commit."
          fi
